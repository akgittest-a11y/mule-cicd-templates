name: MuleSoft Build & Test

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - '**'
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Create .maven/settings.xml
        run: |
          mkdir -p .maven
          cat > .maven/settings.xml <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0
                                        https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>anypoint-exchange</id>
                <username>~~~Client~~~</username>
                <password>${anypoint.connectedAppId}~?~${anypoint.connectedAppSecret}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Build & Run Tests
        run: |
          mvn clean test --settings .maven/settings.xml \
          -Danypoint.connectedAppId="${{ secrets.CONNECTED_APP_ID }}" \
          -Danypoint.connectedAppSecret="${{ secrets.CONNECTED_APP_SECRET }}"

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 14
