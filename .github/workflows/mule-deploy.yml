name: MuleSoft Deploy to CloudHub 2.0

on:
  workflow_call:
    inputs:
      app-name:
        required: true
        type: string
      environment:
        required: true
        type: string
      cloudhub-environment:
        required: true
        type: string
      objectStore-enabled:
        required: true
        type: string

    secrets:
      CONNECTED_APP_ID:
        required: true
      CONNECTED_APP_SECRET:
        required: true
      ANYPOINT_CLIENT_ID:
        required: true
      ANYPOINT_CLIENT_SECRET:
        required: true
      SECURE_KEY:
        required: true

jobs:
  deploy:
    name: Build, Publish & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Create .maven/settings.xml
        run: |
          mkdir -p .maven
          cat > .maven/settings.xml <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
            <settings xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.1.0 http://maven.apache.org/xsd/settings-1.1.0.xsd" xmlns="http://maven.apache.org/SETTINGS/1.1.0"
                      xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" >
                <localRepository/>
                <interactiveMode/>
                <offline/>
                <pluginGroups/>
                <servers>
                <!-- Anypoint Platform authentication -->
               <server>
                  <id>anypoint-exchange-v3</id>
                  <username>~~~Client~~~</username>
                  <password>${anypoint.CONNECTED_APP_ID}~?~${anypoint.CONNECTED_APP_SECRET}</password>
                </server>
                
              </servers>
                <mirrors/>
                <proxies/>
               <profiles>
                <profile>
                  <activation>
                    <activeByDefault>true</activeByDefault>
                  </activation>
                  <repositories>
                    <repository>
                      <id>mulesoft-releases</id>
                      <name>MuleSoft Releases Repository</name>
                      <url>https://repository.mulesoft.org/releases/</url>
                    </repository>
                    <repository>
                      <id>anypoint-exchange-v3</id>
                      <name>Anypoint Exchange</name>
                      <url>https://maven.eu1.anypoint.mulesoft.com/api/v3/maven</url>
                      <layout>default</layout>
                    </repository>
                  </repositories>
                  <id>mule-dev</id>
                </profile>
              </profiles>
                <activeProfiles/>
            </settings>
          EOF

      - name: Publish to Exchange
        run: |
          mvn deploy --settings .maven/settings.xml -DskipTests \
          -Danypoint.connectedAppId="${{ secrets.CONNECTED_APP_ID }}" \
          -Danypoint.connectedAppSecret="${{ secrets.CONNECTED_APP_SECRET }}"

      - name: Deploy to CloudHub 2.0
        run: |
          mvn mule:deploy --settings .maven/settings.xml -DskipTests \
          -Danypoint.connectedAppId="${{ secrets.CONNECTED_APP_ID }}" \
          -Danypoint.connectedAppSecret="${{ secrets.CONNECTED_APP_SECRET }}" \
          -DchTarget=non-prod \
          -Dmule.env=${{ inputs.environment }} \
          -Denvironment=${{ inputs.cloudhub-environment }} \
          -Dreplicas=1 \
          -DvCores=0.1 \
          -Dapp.releaseChannel=LTS \
          -DconnectedAppGrantType=client_credentials \
          -DjavaVersion=17 \
          -Dprovider=MC \
          -DappName="${{ inputs.app-name }}" \
          -DlastMileSecurity=false \
          -DforwardSslSession=false \
          -DgenerateDefaultPublicUrl=true \
          -DobjectStore.enabled="${{ objectStore-enabled }}" \
          -DskipDeploymentVerification=false \
          -Denable.analytics=true \
          -Danypoint.clientId="${{ secrets.ANYPOINT_CLIENT_ID }}" \
          -Danypoint.clientSecret="${{ secrets.ANYPOINT_CLIENT_SECRET }}" \
          -Dsecure.key="${{ secrets.SECURE_KEY }}" \
          -Danypoint.platform.base_uri=https://eu1.anypoint.mulesoft.com \
          -Dapp.env="${{ inputs.environment }}" \
          -Dlog.level.debug=DEBUG \
          -DbooleanDebug=false
